<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Gunerli</title>
  <meta name="description" content="Senior Machine Learning Engineer at UPS Capital. Georgia Tech MS CS." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1c1917;
      --chip-bg:    #262220;
      --input-bg:   #262220;
      --border:     #3a3530;
      --border-alt: #4a4540;
      --text:       #f0ebe4;
      --text-2:     #8b7d72;
      --text-3:     #524744;
      --accent:     #e0704a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    .sidebar {
      width: 256px; flex-shrink: 0;
      display: flex; flex-direction: column;
      padding: 10px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      transition: transform 0.3s ease;
    }
    
    /* Mobile sidebar overlay */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 200;
        background: var(--bg);
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 2px 0 8px rgba(0,0,0,0.5);
      }
    }
    .sidebar-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 6px 14px;
    }
    .brand {
      display: flex; align-items: center; gap: 8px;
      font-size: 14.5px; font-weight: 500; color: var(--text);
      text-decoration: none; letter-spacing: -0.01em; cursor: pointer;
    }
    .brand-mark {
      width: 22px; height: 22px; border-radius: 5px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      letter-spacing: -0.03em; flex-shrink: 0;
    }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 7px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s; text-decoration: none;
    }
    .icon-btn:hover { background: var(--chip-bg); color: var(--text); }

    .nav { display: flex; flex-direction: column; gap: 1px; margin-bottom: 18px; }
    .nav-link {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 9px; border-radius: 7px;
      font-size: 13.5px; color: var(--text-2);
      text-decoration: none; transition: background 0.12s, color 0.12s;
      cursor: pointer; background: none; border: none;
      width: 100%; text-align: left; font-family: inherit;
    }
    .nav-link:hover, .nav-link.active { background: var(--chip-bg); color: var(--text); }

    .section-label {
      font-size: 10.5px; font-weight: 500; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.09em;
      padding: 0 9px 7px; margin-top: 4px;
    }
    .recents { display: flex; flex-direction: column; gap: 1px; margin-bottom: 18px; }
    .recent-link {
      display: block; padding: 6px 9px; border-radius: 7px;
      font-size: 13px; color: var(--text-2); text-decoration: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background 0.12s, color 0.12s;
      cursor: pointer; background: none; border: none;
      width: 100%; text-align: left; font-family: inherit;
      position: relative;
    }
    .recent-link:hover, .recent-link.active { background: var(--chip-bg); color: var(--text); }
    .recent-link:hover .delete-chat { opacity: 1; }
    .delete-chat {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--input-bg);
      border: none;
      color: var(--text-3);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      padding: 0;
    }
    .delete-chat:hover {
      background: #ff4444;
      color: white;
    }
    .new-chat-btn {
      width: 100%;
      padding: 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .new-chat-btn:hover {
      opacity: 0.9;
    }

    .sidebar-footer { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); }
    .user-row { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 7px; }
    .avatar {
      width: 27px; height: 27px; border-radius: 50%;
      background: linear-gradient(135deg, #e0704a 0%, #c85535 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .user-role { font-size: 11px; color: var(--text-2); margin-top: 1px; }

    /* ── MAIN ────────────────────────────────────── */
    #main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    /* ── HOME ────────────────────────────────────── */
    .view-home {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 32px; gap: 28px;
    }
    .greeting { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .brand-mark-lg {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.03em;
      animation: pop-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop-in { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }
    .greeting-text {
      font-family: 'Lora', serif; font-size: 34px; font-weight: 400;
      color: var(--text); letter-spacing: -0.02em;
      animation: fade-up 0.5s 0.1s ease both;
    }
    @keyframes fade-up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .input-wrap { width: 100%; max-width: 620px; animation: fade-up 0.5s 0.2s ease both; }
    .input-box {
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 12px 14px 10px;
      display: flex; flex-direction: column; gap: 8px;
      transition: border-color 0.15s;
    }
    .input-box:focus-within { border-color: var(--border-alt); }
    .input-field {
      background: none; border: none; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 14.5px; color: var(--text);
      width: 100%; resize: none; min-height: 24px; line-height: 1.5;
    }
    .input-field::placeholder { color: var(--text-3); }
    .input-toolbar {
      display: flex; align-items: center; justify-content: space-between;
    }
    .send-btn {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--accent); border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.12s, opacity 0.15s, transform 0.15s;
      opacity: 0; transform: scale(0.8); pointer-events: none;
    }
    .send-btn.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
    .send-btn:hover { background: #c85535; }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 620px; animation: fade-up 0.5s 0.3s ease both; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 99px;
      border: 1px solid var(--border); background: none;
      color: var(--text-2); font-family: 'DM Sans', sans-serif;
      font-size: 13px; cursor: pointer; white-space: nowrap;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }
    .chip:hover { border-color: var(--border-alt); color: var(--text); background: var(--chip-bg); }
    .chip svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── CHAT VIEW ───────────────────────────────── */
    .view-chat {
      flex: 1; display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
    }
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 40px 24px 24px;
      display: flex; flex-direction: column; gap: 0;
    }
    /* Each message row */
    .msg {
      width: 100%; max-width: 720px; margin: 0 auto;
      animation: fade-up 0.2s ease both;
    }
    .msg + .msg { margin-top: 4px; }
    .msg-user + .msg-assistant,
    .msg-assistant + .msg-user { margin-top: 20px; }

    /* User bubble */
    .msg-user { display: flex; justify-content: flex-end; }
    .msg-user .msg-bubble {
      max-width: 80%;
      background: #2e2925;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 10px 16px;
      font-size: 14.5px; line-height: 1.65; color: var(--text);
    }

    /* Assistant row: avatar + text side by side */
    .msg-assistant { display: flex; gap: 12px; align-items: flex-start; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      flex-shrink: 0; margin-top: 2px; letter-spacing: -0.03em;
    }
    .msg-assistant .msg-bubble {
      flex: 1;
      font-size: 14.5px; line-height: 1.75; color: #ccc4ba;
      padding: 4px 0 12px;
    }

    /* Thinking dots */
    .ai-thinking { display: flex; gap: 5px; align-items: center; padding: 8px 0; }
    .ai-thinking span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-3); animation: bounce 1.3s ease infinite;
    }
    .ai-thinking span:nth-child(2) { animation-delay: 0.2s; }
    .ai-thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.4;} 40%{transform:scale(1.1);opacity:1;} }

    /* Bottom input */
    .chat-input-area {
      padding: 12px 24px 24px;
      background: var(--bg);
    }
    .chat-input-area .input-wrap {
      max-width: 720px; margin: 0 auto;
      animation: none;
    }

    /* ── SHARED PAGE ─────────────────────────────── */
    .view-page { flex: 1; padding: 56px 64px; }
    .page-title { font-family: 'Lora', serif; font-size: 28px; font-weight: 400; color: var(--text); margin-bottom: 32px; letter-spacing: -0.02em; }
    .page-desc { font-size: 14px; color: var(--text-2); margin-bottom: 40px; }

    /* Blog list */
    .posts { display: flex; flex-direction: column; gap: 2px; max-width: 640px; }
    .post-card {
      display: block; padding: 18px 20px; border-radius: 10px;
      cursor: pointer; border: 1px solid transparent;
      background: none; width: 100%; text-align: left; font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
    }
    .post-card:hover { background: var(--chip-bg); border-color: var(--border); }
    .post-date { font-size: 11.5px; color: var(--text-3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .post-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .post-desc { font-size: 13.5px; color: var(--text-2); line-height: 1.55; }
    .post-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .tag { font-size: 11px; color: var(--text-3); background: var(--chip-bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 99px; }

    /* Post */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-2);
      background: none; border: none; cursor: pointer; margin-bottom: 32px;
      font-family: inherit; transition: color 0.12s;
    }
    .back-btn:hover { color: var(--text); }
    .post-meta-h { font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px; }
    .post-h1 { font-family: 'Lora', serif; font-size: 30px; font-weight: 400; color: var(--text); letter-spacing: -0.02em; margin-bottom: 32px; max-width: 640px; line-height: 1.3; }
    .post-body { max-width: 640px; font-size: 15.5px; line-height: 1.75; color: #c8bfb6; }
    .post-body p { margin-bottom: 1.4em; }
    .post-footer-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 40px; }

    /* Projects */
    .group { margin-bottom: 40px; }
    .group-label { font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .projects { display: flex; flex-direction: column; gap: 2px; }
    .project { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 12px 14px; border-radius: 9px; text-decoration: none; border: 1px solid transparent; transition: background 0.12s, border-color 0.12s; }
    .project:hover { background: var(--chip-bg); border-color: var(--border); }
    .project-left { flex: 1; min-width: 0; }
    .project-name { font-size: 14.5px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .project-desc { font-size: 13px; color: var(--text-2); line-height: 1.5; }
    .project-lang { font-size: 11.5px; color: var(--text-3); white-space: nowrap; flex-shrink: 0; }
    .lang-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    .lang-python  { background: #3572A5; }
    .lang-cpp     { background: #f34b7d; }
    .lang-cuda    { background: #76b900; }
    .lang-r       { background: #198CE7; }
    .lang-jupyter { background: #DA5B0B; }

    /* ── ARTIFACTS ──────────────────────────────────────── */
    .artifacts-grid {
      columns: 2; gap: 16px; max-width: 720px;
    }
    .artifacts-grid .ig-wrap {
      break-inside: avoid; margin-bottom: 16px;
    }
    .artifacts-grid .instagram-media { min-width: unset !important; width: 100% !important; }
    @media (max-width: 600px) { .artifacts-grid { columns: 1; } }

    /* ── MODEL SELECTOR ─────────────────────────────── */
    .model-wrap { position: relative; }
    .model-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-3); background: none;
      border: none; cursor: pointer; font-family: inherit;
      padding: 2px 0; transition: color 0.12s;
    }
    .model-btn:hover { color: var(--text-2); }
    .model-btn svg { transition: transform 0.15s; }
    .model-btn.open svg { transform: rotate(180deg); }

    .model-dropdown {
      position: absolute; bottom: calc(100% + 6px); left: 0;
      background: #1e1b18; border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
      display: none; flex-direction: column; gap: 1px;
      min-width: 160px; z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      animation: fade-up 0.12s ease both;
    }
    .model-dropdown.open { display: flex; }
    .model-item {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; padding: 7px 10px; border-radius: 7px;
      font-size: 13px; color: var(--text-2); cursor: pointer;
      background: none; border: none; font-family: inherit;
      text-align: left; transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .model-item:hover { background: var(--chip-bg); color: var(--text); }
    .model-item.selected { color: var(--text); }
    .model-item .check {
      width: 14px; height: 14px; flex-shrink: 0;
      color: var(--accent); opacity: 0;
    }
    .model-item.selected .check { opacity: 1; }
    .model-item-sub { font-size: 11px; color: var(--text-3); }

    /* Mobile hamburger button */
    .mobile-menu-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--chip-bg);
      border: 1px solid var(--border);
      color: var(--text);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: background 0.2s;
    }
    .mobile-menu-btn:hover {
      background: var(--input-bg);
    }
    
    /* Mobile overlay backdrop */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 199;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .sidebar-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    
    @media (max-width: 768px) {
      .sidebar-overlay {
        display: block;
      }
    }

    @media (max-width: 768px) {
      .mobile-menu-btn { display: flex; }
      .view-page { padding: 32px 24px; padding-top: 72px; }
      .greeting-text { font-size: 26px; }
      .view-home { padding-top: 40px; }
      
      /* Make sure hamburger doesn't interfere with chat input */
      .chat-input-area { padding-top: 12px; }
    }
  </style>
</head>

// ── CHAT STATE ─────────────────────────────────────────────
let chatHistory = [];
let inChatMode = false;
let selectedModel = 'auto';
let currentSessionId = null;
let chatSessions = [];

// Load chat sessions from localStorage
function loadChatSessions() {
  try {
    const saved = localStorage.getItem('chatSessions');
    chatSessions = saved ? JSON.parse(saved) : [];
  } catch (e) {
    chatSessions = [];
  }
  renderChatHistory();
}

// Save chat sessions to localStorage
function saveChatSessions() {
  try {
    localStorage.setItem('chatSessions', JSON.stringify(chatSessions));
  } catch (e) {
    console.error('Failed to save chat sessions:', e);
  }
}

// Create a new chat session
function startNewChat() {
  // Save current session if it has messages
  if (currentSessionId && chatHistory.length > 0) {
    saveCurrentSession();
  }
  
  // Reset to home
  currentSessionId = null;
  chatHistory = [];
  inChatMode = false;
  navigate('/');
  renderChatHistory();
}

// Save the current chat session
function saveCurrentSession() {
  if (!chatHistory.length) return;
  
  const existingIndex = chatSessions.findIndex(s => s.id === currentSessionId);
  const title = chatHistory[0]?.content?.substring(0, 50) || 'New Chat';
  const timestamp = Date.now();
  
  const session = {
    id: currentSessionId || `chat_${timestamp}`,
    title,
    messages: [...chatHistory],
    timestamp
  };
  
  if (existingIndex >= 0) {
    chatSessions[existingIndex] = session;
  } else {
    currentSessionId = session.id;
    chatSessions.unshift(session); // Add to beginning
  }
  
  // Keep only last 20 sessions
  if (chatSessions.length > 20) {
    chatSessions = chatSessions.slice(0, 20);
  }
  
  saveChatSessions();
  renderChatHistory();
}

// Load a chat session
function loadChatSession(sessionId) {
  const session = chatSessions.find(s => s.id === sessionId);
  if (!session) return;
  
  currentSessionId = sessionId;
  chatHistory = [...session.messages];
  inChatMode = true;
  
  // Render the chat
  const main = document.getElementById('main');
  main.innerHTML = chatViewHTML();
  
  // Render all messages
  const messagesContainer = document.getElementById('chat-messages');
  messagesContainer.innerHTML = '';
  
  chatHistory.forEach(msg => {
    if (msg.role === 'user') {
      appendUserMsg(msg.content);
    } else if (msg.role === 'assistant') {
      // Format markdown-style links and bold in saved messages
      const formattedContent = msg.content
        .replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
      
      const el = document.getElementById('chat-messages');
      el.insertAdjacentHTML('beforeend', `
        <div class="msg msg-assistant">
          <div class="msg-avatar">jg</div>
          <div class="msg-bubble">${formattedContent}</div>
        </div>`);
    }
  });
  
  scrollChat();
  document.getElementById('q')?.focus();
  renderChatHistory();
}

// Delete a chat session
function deleteChatSession(sessionId, event) {
  event.stopPropagation();
  chatSessions = chatSessions.filter(s => s.id !== sessionId);
  
  // If deleting current session, start new chat
  if (currentSessionId === sessionId) {
    startNewChat();
  } else {
    saveChatSessions();
    renderChatHistory();
  }
}

// Render chat history in sidebar
function renderChatHistory() {
  const container = document.getElementById('chat-history-list');
  if (!container) return;
  
  if (chatSessions.length === 0) {
    container.innerHTML = '<div style="padding: 8px 9px; font-size: 12px; color: var(--text-3); text-align: center;">No chat history yet</div>';
    return;
  }
  
  container.innerHTML = chatSessions.map(session => `
    <button class="recent-link${currentSessionId === session.id ? ' active' : ''}" 
            onclick="loadChatSession('${session.id}')">
      ${escHtml(session.title)}
      <button class="delete-chat" onclick="deleteChatSession('${session.id}', event)" title="Delete chat">
        ×
      </button>
    </button>
  `).join('');
}

function modelSelectorHTML() {
  const checkSvg = `<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const chevron = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
  return `<div class="model-wrap">

      ${MODEL_OPTIONS.map(m => `
        <button class="model-item${selectedModel===m.id?' selected':''}" onclick="selectModel('${m.id}')">
          <span>${m.label} <span class="model-item-sub">${m.sub}</span></span>
          ${checkSvg}
        </button>`).join('')}
    </div>
    <button class="model-btn" id="model-btn" onclick="toggleModelDropdown(event)">
      ${chevron}${currentModelLabel()}
    </button>
  </div>`;
}

function toggleModelDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('model-dropdown');
  const btn = document.getElementById('model-btn');
  if (!dd) return;
  const isOpen = dd.classList.toggle('open');
  btn?.classList.toggle('open', isOpen);
  if (isOpen) {
    const close = () => { dd.classList.remove('open'); btn?.classList.remove('open'); document.removeEventListener('click', close); };
    document.addEventListener('click', close);
  }
}

function selectModel(id) {
  selectedModel = id;
  refreshModelRows();
}

function refreshModelRows() {
  document.querySelectorAll('.model-wrap').forEach(wrap => {
    wrap.outerHTML = modelSelectorHTML();
  });
}

// Enhanced pattern matching for natural language queries (returns text responses!)
function detectIntent(query) {
  const lower = query.toLowerCase();
  
  // Email/Contact patterns - most common query
  if (/\b(what'?s?|what is|tell me|show|give me)\b.*\b(his|your|the|john'?s?)\b.*\b(email|contact)\b/.test(lower) ||
      /\b(email|contact|reach|mail)\b/.test(lower)) {
    return "John's email is **me@johngunerli.com**. Feel free to reach out!";
  }
  
  // Meeting patterns
  if (/\b(schedule|book|set up|arrange|meeting|calendar)\b/.test(lower)) {
    return "You can schedule a meeting with John here: [Book a meeting](https://calendar.app.google/xzXuLCv1Ff85Gp1JA)";
  }
  
  // Resume/CV patterns
  if (/\b(resume|cv)\b/.test(lower)) {
    return "John's resume/CV can be found in the navigation menu above.";
  }
  
  // Blog patterns
  if (/\b(blog|posts?|writing|articles?)\b/.test(lower)) {
    return "John writes about intellectual curiosity, social computing, and the arts. Check out the **Blog** section!";
  }
  
  // Projects patterns
  if (/\b(projects?|work|code|portfolio)\b/.test(lower)) {
    return "You can explore John's projects in the **Projects** section in the navigation.";
  }
  
  // Artifacts patterns
  if (/\b(artifacts?|photos?|gallery|pictures?|images?)\b/.test(lower)) {
    return "Check out John's artifacts and photos in the **Artifacts** section!";
  }
  
  // Social media patterns
  if (/\bgithub\b/.test(lower)) {
    return "John's GitHub: [github.com/johngunerli](https://github.com/johngunerli)";
  }
  
  if (/\blinkedin\b/.test(lower)) {
    return "Connect with John on [LinkedIn](https://www.linkedin.com/in/hakancangunerli/)";
  }
  
  if (/\byoutube\b/.test(lower)) {
    return "John's YouTube: [youtube.com/@johngunerli](https://www.youtube.com/@johngunerli/)";
  }
  
  return null;
}

function chatViewHTML() {

function switchToChatMode() {
  inChatMode = true;
  document.getElementById('main').innerHTML = chatViewHTML();
  document.getElementById('q').focus();
}

function appendUserMsg(text) {
  const el = document.getElementById('chat-messages');
  el.insertAdjacentHTML('beforeend', `
    <div class="msg msg-user">
      <div class="msg-bubble">${escHtml(text)}</div>
    </div>`);
  scrollChat();
}

function appendThinking() {
  const el = document.getElementById('chat-messages');
  el.insertAdjacentHTML('beforeend', `
    <div class="msg msg-assistant" id="thinking-msg">
      <div class="msg-avatar">jg</div>
      <div class="msg-bubble"><div class="ai-thinking"><span></span><span></span><span></span></div></div>
    </div>`);
  scrollChat();
}

function replaceThinking(answer) {
  const el = document.getElementById('thinking-msg');
  if (el) {
    el.removeAttribute('id');
    el.querySelector('.msg-bubble').textContent = answer;
  }
  scrollChat();
}

// Stream instant response with typing effect
async function streamResponse(text) {
  const el = document.getElementById('chat-messages');
  el.insertAdjacentHTML('beforeend', `
    <div class="msg msg-assistant">
      <div class="msg-avatar">jg</div>
      <div class="msg-bubble" id="streaming-msg"></div>
    </div>`);
  
  const bubble = document.getElementById('streaming-msg');
  
  // Convert markdown-style links and bold
  const formattedText = text
    .replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
  
  // Simulate streaming by revealing characters
  let displayed = '';
  const chars = formattedText.split('');
  
  for (let i = 0; i < chars.length; i++) {
    displayed += chars[i];
    bubble.innerHTML = displayed;
    scrollChat();
    
    // Random delay between 10-30ms for natural typing effect
    await new Promise(resolve => setTimeout(resolve, Math.random() * 20 + 10));
  }
  
  bubble.removeAttribute('id');
}

function scrollChat() {
  const el = document.getElementById('chat-messages');
  if (el) el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleSend(input) {
  document.getElementById('send-btn')?.classList.toggle('visible', input.value.trim().length > 0);
}

async function submitQuery() {
  const input = document.getElementById('q');
  const q = input.value.trim();
  if (!q) return;

  input.value = ''; 
  toggleSend(input);

  // Switch to chat mode on first query
  if (!inChatMode) switchToChatMode(q);

  appendUserMsg(q);

  // Try pattern matching first (instant response, no AI needed!)
  const instantResponse = detectIntent(q);
  if (instantResponse) {
    // Add to chat history for pattern-matched responses too
    chatHistory.push({ role: 'user', content: q });
    chatHistory.push({ role: 'assistant', content: instantResponse });
    await streamResponse(instantResponse);
    saveCurrentSession(); // Auto-save after each exchange
    return; 
  }

  // If no pattern match, use AI
  appendThinking();

  chatHistory.push({ role: 'user', content: q });

  const models = selectedModel === 'auto'
    ? ['openai/gpt-oss-120b:free', 'meta-llama/llama-3.3-70b-instruct:free', 'google/gemma-3-12b-it:free']
    : [selectedModel];

  let answered = false;
  for (const model of models) {
    try {
      // Call our Cloudflare Function instead of OpenRouter directly
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model,
          messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chatHistory],
          max_tokens: 300,
        })
      });
      if (res.status === 429) continue; // try next model
      const data = await res.json();
      const answer = data?.choices?.[0]?.message?.content
                  || data?.error?.message
                  || 'Something went wrong.';
      chatHistory.push({ role: 'assistant', content: answer });
      replaceThinking(answer);
      answered = true;
      saveCurrentSession(); // Auto-save after AI response
      break;
    } catch { continue; }
  }
  if (!answered) replaceThinking("All free models are rate-limited right now — try again in a minute.");

  document.getElementById('q')?.focus();
}

function onEnter(e) { if (e.key === 'Enter') submitQuery(); }
